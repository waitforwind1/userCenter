spring:
  application:
    name: userCenter
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/userCenter
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  # session失效时间 一天86400s
  session:
    timeout: 86400
server:
  port: 8080


mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  global-config:
      db-config:
        logic-delete-field: idDelete # 全局逻辑删除字段名(deleted为实体类属性名称)
        logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
        logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0
